<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Opaque backdrop (paper-50) so this also works as apple-touch-icon,
       which iOS flattens to black wherever there's transparency. -->
  <rect width="512" height="512" fill="#fffdf9"/>

  <!-- The app's actual tile shape: rounded top-left/bottom-right corners,
       square top-right/bottom-left (App.css .tile: "10px 0 10px 0"),
       in the tile-rack blue token. Sized down from the full 400x400 so the
       mark reads as an icon sitting on a canvas rather than filling it edge
       to edge (matches typical iOS/Android icon proportions). -->
  <path
    d="M162,86 L426,86 L426,350 A76,76 0 0 1 350,426 L86,426 L86,162 A76,76 0 0 1 162,86 Z"
    fill="#2a5391"
  />

  <!-- "W" monogram: a plain geometric stroke, not live text, so rendering
       never depends on a font being installed on the build machine. Taller
       than wide (upright, not sprawled) with sharp inner vertices (miter
       joins) for a typographic feel closer to the app's UI sans (Figtree)
       than a hand-drawn doodle; round caps keep the same friendly softness
       as the tile's own rounded corner. -->
  <path
    d="M161,141 L208.5,371 L256,238 L303.5,371 L351,141"
    fill="none"
    stroke="#ffffff"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="miter"
  />
</svg>
