<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#e4602f" />
    <!-- iOS ignores the manifest's display mode for status-bar styling and
         wants this duplicated; only matters once running standalone (Share
         -> Add to Home Screen), a no-op in a normal tab. "default" keeps the
         status bar opaque so iOS reserves space for it automatically --
         "black-translucent" draws the app full-bleed underneath it instead,
         which needs every top-anchored bar padded with
         env(safe-area-inset-top) to avoid colliding with the clock/battery
         (the topbar doesn't do that, so black-translucent visibly broke it). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Wordplay" />

    <meta property="og:title" content="Wordplay" />
    <meta property="og:description" content="A delightful word game for two." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://wordplay.lightbody.net/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wordplay" />
    <meta name="twitter:description" content="A delightful word game for two." />
    <title>Wordplay</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
