<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Preview-stack variant: identical board, but an amber tile instead of
       tile-board blue. Sage green is already spoken for by the
       triple-letter cell in this composition, so re-using it to mean "not
       production" (like the old flat-tile icon did) would clash. Amber
       reads as distinctly "different" at a glance (and isn't easily
       confused with blue even for most color-vision deficiencies), so a PR
       preview installed alongside the real app is never mistaken for it. -->
  <rect width="512" height="512" fill="#ffffff"/>
  <rect x="0" y="0" width="251" height="251" fill="#eeedeb"/>
  <rect x="261" y="0" width="251" height="251" fill="#d8dfee"/>
  <rect x="0" y="261" width="251" height="251" fill="#dde7d0"/>
  <rect x="261" y="261" width="251" height="251" fill="#eeedeb"/>

  <g transform="translate(264,266) rotate(-9)">
    <path
      d="M-71,-128 L128,-128 L128,71 A57,57 0 0 1 71,128 L-128,128 L-128,-71 A57,57 0 0 1 -71,-128 Z"
      fill="#000000"
      opacity="0.18"
    />
  </g>

  <g transform="translate(256,256) rotate(-9)">
    <path
      d="M-71,-128 L128,-128 L128,71 A57,57 0 0 1 71,128 L-128,128 L-128,-71 A57,57 0 0 1 -71,-128 Z"
      fill="#dda426"
    />
    <text
      x="0"
      y="65"
      text-anchor="middle"
      font-family="Figtree"
      font-weight="700"
      font-size="168"
      fill="#ffffff"
    >W</text>
    <text
      x="98"
      y="107"
      text-anchor="end"
      font-family="Figtree"
      font-weight="700"
      font-size="32"
      fill="#ffffff"
      opacity="0.85"
    >4</text>
  </g>
</svg>
