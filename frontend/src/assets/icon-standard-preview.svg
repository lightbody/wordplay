  <path
    d="M146,56 L456,56 L456,366 A90,90 0 0 1 366,456 L56,456 L56,146 A90,90 0 0 1 146,56 Z"
    fill="#3f6b4c"
  />

  <path
    d="M112,196 L184,326 L256,238 L328,326 L400,196"
    fill="none"
    stroke="#ffffff"
    stroke-width="44"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <rect x="350" y="350" width="62" height="62" rx="14" fill="#e4602f"/>
</svg>
