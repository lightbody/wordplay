<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Preview-stack variant: same mark, sage green instead of tile-rack
       blue, so a PR preview installed alongside the real app is never
       mistaken for it on a home screen or in a notification. -->
