<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- A stylized intersection of four board cells: two regular, two
       premium (double-word lavender top-right, triple-letter sage
       bottom-left), separated by the board's white grid line, using the
       real in-game cell colors (App.css cell-bg/dw/tl/board-line tokens).
       Full-bleed, no backdrop or outer rounding of our own: iOS/Android
       already apply their own icon mask, so we lean into that instead of
       drawing a second one on top of it. -->
  <rect width="512" height="512" fill="#ffffff"/>
  <rect x="0" y="0" width="251" height="251" fill="#eeedeb"/>
  <rect x="261" y="0" width="251" height="251" fill="#d8dfee"/>
  <rect x="0" y="261" width="251" height="251" fill="#dde7d0"/>
  <rect x="261" y="261" width="251" height="251" fill="#eeedeb"/>

  <!-- Cast shadow for the tile below, offset in canvas space rather than
       the tile's own rotated local space, so it reads as light falling on
       a dropped object instead of spinning along with it. -->
  <g transform="translate(264,266) rotate(-9)">
    <path
      d="M-71,-128 L128,-128 L128,71 A57,57 0 0 1 71,128 L-128,128 L-128,-71 A57,57 0 0 1 -71,-128 Z"
      fill="#000000"
      opacity="0.18"
    />
  </g>

  <!-- The tile itself, mid-drop onto the intersection: the app's real
       asymmetric tile radius (App.css .tile is "10px 0 10px 0") and
       tile-board blue, tilted as if just dragged into place. -->
  <g transform="translate(256,256) rotate(-9)">
    <path
      d="M-71,-128 L128,-128 L128,71 A57,57 0 0 1 71,128 L-128,128 L-128,-71 A57,57 0 0 1 -71,-128 Z"
      fill="#4076c5"
    />
    <!-- "W" monogram: a plain geometric stroke, not live text, so
         rendering never depends on a font being installed on the build
         machine. -->
    <path
      d="M-71,-87 L-35.5,87 L0,-14 L35.5,87 L71,-87"
      fill="none"
      stroke="#ffffff"
      stroke-width="26"
      stroke-linecap="round"
      stroke-linejoin="miter"
    />
    <!-- Point value, echoing the real tile's .tile-value corner badge
         (App.css); a plain digit is simple and robust enough to not need a
         hand-drawn glyph like the W above. -->
    <text
      x="98"
      y="107"
      text-anchor="end"
      font-family="Arial, Helvetica, sans-serif"
      font-weight="700"
      font-size="30"
      fill="#ffffff"
      opacity="0.85"
    >4</text>
  </g>
</svg>
