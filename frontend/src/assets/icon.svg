<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- A stylized intersection of four board cells: two regular, two
       premium (double-word lavender top-right, triple-letter sage
       bottom-left), separated by the board's white grid line, using the
       real in-game cell colors (App.css cell-bg/dw/tl/board-line tokens).
       Full-bleed, no backdrop or outer rounding of our own: iOS/Android
       already apply their own icon mask, so we lean into that instead of
       drawing a second one on top of it. -->
  <rect width="512" height="512" fill="#ffffff"/>
  <rect x="0" y="0" width="249.35" height="249.35" fill="#eeedeb"/>
  <rect x="262.65" y="0" width="249.35" height="249.35" fill="#c4cbda"/>
  <rect x="0" y="262.65" width="249.35" height="249.35" fill="#c9d3bc"/>
  <rect x="262.65" y="262.65" width="249.35" height="249.35" fill="#eeedeb"/>

  <!-- Cast shadow for the tile below, offset in canvas space rather than
       the tile's own rotated local space, so it reads as light falling on
       a dropped object instead of spinning along with it. -->
  <g transform="translate(264,266) rotate(-9) scale(1.2)">
    <path
      d="M-71,-128 L128,-128 L128,71 A57,57 0 0 1 71,128 L-128,128 L-128,-71 A57,57 0 0 1 -71,-128 Z"
      fill="#000000"
      opacity="0.18"
    />
  </g>

  <!-- The tile itself, mid-drop onto the intersection: the app's real
       asymmetric tile radius (App.css .tile is "10px 0 10px 0") and
       tile-board blue, tilted as if just dragged into place. scale(1.2)
       grows the whole tile (shape, letter, and value together) uniformly
       around its own local origin, applied before the rotate/translate. -->
  <g transform="translate(256,256) rotate(-9) scale(1.2)">
    <path
      d="M-71,-128 L128,-128 L128,71 A57,57 0 0 1 71,128 L-128,128 L-128,-71 A57,57 0 0 1 -71,-128 Z"
      fill="#4076c5"
    />
    <!-- The actual in-game tile letterform: Figtree Bold, same as
         .tile-letter (App.css). generate-icons.mjs embeds the real font
         file (src/assets/fonts/figtree-bold.ttf) via @font-face so this
         renders correctly regardless of what's installed on the build
         machine. -->
    <text
      x="0"
      y="65"
      text-anchor="middle"
      font-family="Figtree"
      font-weight="700"
      font-size="168"
      fill="#ffffff"
    >W</text>
    <!-- Point value, echoing the real tile's .tile-value corner badge
         (App.css), same font. -->
    <text
      x="98"
      y="107"
      text-anchor="end"
      font-family="Figtree"
      font-weight="700"
      font-size="32"
      fill="#ffffff"
      opacity="0.85"
    >4</text>
  </g>
</svg>
