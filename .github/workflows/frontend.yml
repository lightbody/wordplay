name: Frontend

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend.yml
  # No paths filter on PRs: every PR gets a full preview stack, so the
  # frontend must always be rebuilt against the PR's backend/Electric apps.
  pull_request:

concurrency:
  group: frontend-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ github.event_name == 'pull_request' && format('https://plightbo-wordplay-backend-pr-{0}.fly.dev', github.event.pull_request.number) || 'https://plightbo-wordplay-backend.fly.dev' }}
          VITE_ELECTRIC_URL: ${{ github.event_name == 'pull_request' && format('https://plightbo-wordplay-electric-pr-{0}.fly.dev', github.event.pull_request.number) || 'https://plightbo-wordplay-electric.fly.dev' }}
          # Same WorkOS Production Client ID for prod and every PR preview
          # (with a wildcard redirect URI registered in the WorkOS
          # dashboard) so prod and preview share one user pool/IDs.
          VITE_WORKOS_CLIENT_ID: ${{ secrets.VITE_WORKOS_CLIENT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      # Checkout brings in frontend/functions/ so wrangler compiles the
      # OG-preview Pages Function alongside the static assets.
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: wordplay-frontend
          workingDirectory: frontend
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref || github.ref_name }}

      - name: Update preview environment comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { upsertPreviewComment } = require('./.github/scripts/preview-comment.js');
            await upsertPreviewComment(github, context, {
              frontendUrl: '${{ steps.deploy.outputs.alias }}',
            });
